<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Preview</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/basecoat-css@1.0.2/dist/basecoat.cdn.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/basecoat-css@1.0.2/dist/js/all.min.js" defer></script>
  <style>
    :root { color-scheme: light; }
    body {
      font-family: system-ui, sans-serif;
      margin: 0;
      padding: 24px;
      background: var(--background, #fff);
      color: var(--foreground, #111);
      box-sizing: border-box;
    }
    .preview-root { width: 100%; max-width: 48rem; margin: 0 auto; }
  </style>
</head>
<body>
  <div class="preview-root">
<div class="empty">
    <div class="empty-title"><h3>No results</h3></div>
    <div class="empty-description"><p>Try adjusting your search or filters.</p></div>
    <div class="empty-content"></div>
</div>
  </div>
</body>
</html>
