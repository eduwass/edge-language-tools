<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Preview</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/basecoat-css@1.0.2/dist/basecoat.cdn.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/basecoat-css@1.0.2/dist/js/all.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/basecoat-css@1.0.2/dist/js/chart.min.js" defer></script>
  <style>
    :root { color-scheme: light dark; }
    body {
      font-family: system-ui, sans-serif;
      margin: 0;
      padding: 24px;
      background: var(--background, Canvas);
      color: var(--foreground, CanvasText);
      box-sizing: border-box;
    }
    .preview-root { width: 100%; max-width: 48rem; margin: 0 auto; }
  </style>
  <script>
    // Follow the docs site's theme: blume stamps data-theme on its root, and
    // previews are same-origin, so the parent document is readable. Falls
    // back to the OS preference when embedded elsewhere. Basecoat's dark
    // palette activates via the .dark class.
    ;(function () {
      function apply() {
        var dark
        try {
          var t = parent.document.documentElement.dataset.theme
          dark = t ? t === 'dark' : matchMedia('(prefers-color-scheme: dark)').matches
        } catch (e) {
          dark = matchMedia('(prefers-color-scheme: dark)').matches
        }
        document.documentElement.classList.toggle('dark', dark)
      }
      apply()
      setInterval(apply, 500)
    })()
  </script>
</head>
<body>
  <div class="preview-root">
<div id="preview-tabs" class="tabs ">
  <nav
    role="tablist"
    aria-orientation="horizontal"
  >
      <button
        type="button"
        role="tab"
        id="preview-tabs-tab-1"
        aria-controls="preview-tabs-panel-1"
        aria-selected="true"
        tabindex="0"
      >Account</button>
      <button
        type="button"
        role="tab"
        id="preview-tabs-tab-2"
        aria-controls="preview-tabs-panel-2"
        aria-selected="false"
        tabindex="-1"
      >Password</button>
      <button
        type="button"
        role="tab"
        id="preview-tabs-tab-3"
        aria-controls="preview-tabs-panel-3"
        aria-selected="false"
        tabindex="-1"
      >Team</button>
  </nav>

      <div
        role="tabpanel"
        id="preview-tabs-panel-1"
        aria-labelledby="preview-tabs-tab-1"
        tabindex="-1"
        aria-selected="true"
      ><p>Account settings</p></div>

      <div
        role="tabpanel"
        id="preview-tabs-panel-2"
        aria-labelledby="preview-tabs-tab-2"
        tabindex="-1"
        aria-selected="false"
        hidden
      ><p>Change your password</p></div>

      <div
        role="tabpanel"
        id="preview-tabs-panel-3"
        aria-labelledby="preview-tabs-tab-3"
        tabindex="-1"
        aria-selected="false"
        hidden
      ><p>Manage your team</p></div>
</div>
  </div>
</body>
</html>
