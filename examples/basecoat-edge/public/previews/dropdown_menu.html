<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Preview</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/basecoat-css@1.0.2/dist/basecoat.cdn.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/basecoat-css@1.0.2/dist/js/all.min.js" defer></script>
  <style>
    :root { color-scheme: light dark; }
    body {
      font-family: system-ui, sans-serif;
      margin: 0;
      padding: 24px;
      background: var(--background, Canvas);
      color: var(--foreground, CanvasText);
      box-sizing: border-box;
    }
    .preview-root { width: 100%; max-width: 48rem; margin: 0 auto; }
  </style>
  <script>
    // Follow the docs site's theme: blume stamps data-theme on its root, and
    // previews are same-origin, so the parent document is readable. Falls
    // back to the OS preference when embedded elsewhere. Basecoat's dark
    // palette activates via the .dark class.
    ;(function () {
      function apply() {
        var dark
        try {
          var t = parent.document.documentElement.dataset.theme
          dark = t ? t === 'dark' : matchMedia('(prefers-color-scheme: dark)').matches
        } catch (e) {
          dark = matchMedia('(prefers-color-scheme: dark)').matches
        }
        document.documentElement.classList.toggle('dark', dark)
      }
      apply()
      setInterval(apply, 500)
    })()
  </script>
</head>
<body>
  <div class="preview-root">
<div id="preview-dropdown" class="dropdown-menu ">
  <button
    type="button"
    id="preview-dropdown-trigger"
    aria-haspopup="menu"
    aria-controls="preview-dropdown-menu"
    aria-expanded="false"
    class="btn"
  >
        Open menu
  </button>
  <div id="preview-dropdown-popover" data-popover aria-hidden="true">
    <div role="menu" id="preview-dropdown-menu" aria-labelledby="preview-dropdown-trigger">


            <div id="preview-dropdown-items-1" role="menuitem">
              <span>Profile</span>
            </div>

            <div id="preview-dropdown-items-2" role="menuitem">
              <span>Settings</span>
            </div>

            <hr role="separator" />

            <div id="preview-dropdown-items-4" role="menuitem">
              <span>Logout</span>
            </div>
    </div>
  </div>
</div>
  </div>
</body>
</html>
