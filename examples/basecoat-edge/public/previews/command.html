<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Preview</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/basecoat-css@1.0.2/dist/basecoat.cdn.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/basecoat-css@1.0.2/dist/js/all.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/basecoat-css@1.0.2/dist/js/chart.min.js" defer></script>
  <style>
    :root { color-scheme: light dark; }
    body {
      font-family: system-ui, sans-serif;
      margin: 0;
      padding: 24px;
      background: var(--background, Canvas);
      color: var(--foreground, CanvasText);
      box-sizing: border-box;
    }
    .preview-root { width: 100%; max-width: 48rem; margin: 0 auto; }
  </style>
  <script>
    // Follow the docs site's theme: blume stamps data-theme on its root, and
    // previews are same-origin, so the parent document is readable. Falls
    // back to the OS preference when embedded elsewhere. Basecoat's dark
    // palette activates via the .dark class.
    ;(function () {
      function apply() {
        var dark
        try {
          var t = parent.document.documentElement.dataset.theme
          dark = t ? t === 'dark' : matchMedia('(prefers-color-scheme: dark)').matches
        } catch (e) {
          dark = matchMedia('(prefers-color-scheme: dark)').matches
        }
        document.documentElement.classList.toggle('dark', dark)
      }
      apply()
      setInterval(apply, 500)
    })()
  </script>
</head>
<body>
  <div class="preview-root">
<div id="preview-command" class="command " aria-label="Command menu">
  <header><svg width="1em" height="1em" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><path d="m21 21l-4.34-4.34"/><circle cx="11" cy="11" r="8"/></g></svg>
    <input type="text" id="preview-command-input" placeholder="Type a command or search..." autocomplete="off" autocorrect="off" spellcheck="false" aria-autocomplete="list" role="combobox" aria-expanded="true" aria-controls="preview-command-menu" class="" />
  </header>
  <div role="menu" id="preview-command-menu" aria-orientation="vertical" data-empty="No results found." class="">


          <div role="group" aria-labelledby="group-label-preview-command-1">
            <span role="heading" id="group-label-preview-command-1">Suggestions</span>


                  <div
                    id="preview-command-items-1-1"
                    role="menuitem"
                    data-filter="Calendar"
                    data-keywords="date event schedule"
                  >
<svg width="1em" height="1em" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><path d="M8 2v4m8-4v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/></g></svg>
                    <span>Calendar</span>
                  </div>

                  <div
                    id="preview-command-items-1-2"
                    role="menuitem"
                    data-filter="Search Emoji"
                    data-keywords="emoji smile reaction"
                  >
<svg width="1em" height="1em" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2s4-2 4-2M9 9h.01M15 9h.01"/></g></svg>
                    <span>Search Emoji</span>
                  </div>

                  <div
                    id="preview-command-items-1-3"
                    role="menuitem"
                    data-filter="Calculator"
                    aria-disabled="true"
                  >
<svg width="1em" height="1em" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><rect width="16" height="20" x="4" y="2" rx="2"/><path d="M8 6h8m0 8v4m0-8h.01M12 10h.01M8 10h.01M12 14h.01M8 14h.01M12 18h.01M8 18h.01"/></g></svg>
                    <span>Calculator</span>
                  </div>
          </div>

          <hr role="separator" />

          <div role="group" aria-labelledby="group-label-preview-command-3">
            <span role="heading" id="group-label-preview-command-3">Settings</span>


                  <div
                    id="preview-command-items-3-1"
                    role="menuitem"
                    data-filter="Profile"
                  >
<svg width="1em" height="1em" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></g></svg>
                    <span>Profile</span>
                      <span data-shortcut>⌘P</span>
                  </div>

                  <div
                    id="preview-command-items-3-2"
                    role="menuitem"
                    data-filter="Billing"
                  >
<svg width="1em" height="1em" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><rect width="20" height="14" x="2" y="5" rx="2"/><path d="M2 10h20"/></g></svg>
                    <span>Billing</span>
                      <span data-shortcut>⌘B</span>
                  </div>

                  <div
                    id="preview-command-items-3-3"
                    role="menuitem"
                    data-filter="Settings"
                  >
<svg width="1em" height="1em" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><path d="M9.671 4.136a2.34 2.34 0 0 1 4.659 0a2.34 2.34 0 0 0 3.319 1.915a2.34 2.34 0 0 1 2.33 4.033a2.34 2.34 0 0 0 0 3.831a2.34 2.34 0 0 1-2.33 4.033a2.34 2.34 0 0 0-3.319 1.915a2.34 2.34 0 0 1-4.659 0a2.34 2.34 0 0 0-3.32-1.915a2.34 2.34 0 0 1-2.33-4.033a2.34 2.34 0 0 0 0-3.831A2.34 2.34 0 0 1 6.35 6.051a2.34 2.34 0 0 0 3.319-1.915"/><circle cx="12" cy="12" r="3"/></g></svg>
                    <span>Settings</span>
                      <span data-shortcut>⌘S</span>
                  </div>
          </div>
  </div>
</div>
  </div>
</body>
</html>
