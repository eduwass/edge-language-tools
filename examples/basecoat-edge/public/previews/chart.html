<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Preview</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/basecoat-css@1.0.2/dist/basecoat.cdn.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/basecoat-css@1.0.2/dist/js/all.min.js" defer></script>
  <style>
    :root { color-scheme: light; }
    body {
      font-family: system-ui, sans-serif;
      margin: 0;
      padding: 24px;
      background: var(--background, #fff);
      color: var(--foreground, #111);
      box-sizing: border-box;
    }
    .preview-root { width: 100%; max-width: 48rem; margin: 0 auto; }
  </style>
</head>
<body>
  <div class="preview-root">
<div class="chart" data-type="bar">
    <div style="display: flex; align-items: flex-end; gap: 0.5rem; height: 10rem; padding: 1rem;">
    <div style="flex: 1; height: 40%; background: var(--primary, #333); border-radius: 4px;"></div>
    <div style="flex: 1; height: 70%; background: var(--primary, #333); border-radius: 4px;"></div>
    <div style="flex: 1; height: 55%; background: var(--primary, #333); border-radius: 4px;"></div>
    <div style="flex: 1; height: 85%; background: var(--primary, #333); border-radius: 4px;"></div>
  </div>
</div>
  </div>
</body>
</html>
