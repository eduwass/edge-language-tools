<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Preview</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/basecoat-css@1.0.2/dist/basecoat.cdn.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/basecoat-css@1.0.2/dist/js/all.min.js" defer></script>
  <style>
    :root { color-scheme: light; }
    body {
      font-family: system-ui, sans-serif;
      margin: 0;
      padding: 24px;
      background: var(--background, #fff);
      color: var(--foreground, #111);
      box-sizing: border-box;
    }
    .preview-root { width: 100%; max-width: 48rem; margin: 0 auto; }
  </style>
</head>
<body>
  <div class="preview-root">
<aside
  id="preview-sidebar"
  class="sidebar "
  data-side="left"
  aria-hidden="false"
>
  <nav aria-label="Sidebar navigation">
    <section>
        <ul>

              <li>
                <a href="#" @if(item.current) aria-current="page" @end>
                  <span>Dashboard</span>
                </a>
              </li>

              <li>
                <a href="#" @if(item.current) aria-current="page" @end>
                  <span>Projects</span>
                </a>
              </li>

              <li><hr role="separator" /></li>

              <li>
                <a href="#" @if(item.current) aria-current="page" @end>
                  <span>Settings</span>
                </a>
              </li>

              <li>
                <a href="#" @if(item.current) aria-current="page" @end>
                  <span>Help</span>
                </a>
              </li>
        </ul>
    </section>
  </nav>
</aside>
  </div>
</body>
</html>
