<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Preview</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/basecoat-css@0.3.11/dist/basecoat.cdn.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/basecoat-css@0.3.11/dist/js/all.min.js" defer></script>
  <style>
    :root { color-scheme: light; }
    body {
      font-family: system-ui, sans-serif;
      margin: 0;
      padding: 24px;
      background: var(--background, #fff);
      color: var(--foreground, #111);
      box-sizing: border-box;
    }
    .preview-root { width: 100%; max-width: 48rem; margin: 0 auto; }
  </style>
</head>
<body>
  <div class="preview-root">
<section class="accordion">
    <details open>
    <summary>
      Is it accessible?<svg width="1em" height="1em" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m6 9l6 6l6-6"/></svg>
    </summary>
    <section>Yes. It uses native disclosure semantics.</section>
  </details>
  <details>
    <summary>
      Is it styled?<svg width="1em" height="1em" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m6 9l6 6l6-6"/></svg>
    </summary>
    <section>Yes. It comes with basecoat styles.</section>
  </details>
</section>
  </div>
</body>
</html>
